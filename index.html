<!DOCTYPE html>
<html>
<head>
<title>Wallforce – Wallpaper Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
</head>

<body>

<header>
<h1>Wallforce</h1>
<p>Hello visitor, welcome to my wallpaper engine. Generate wallpapers instantly.</p>
</header>

<div class="controls">

<select id="device">
<option value="mobile">Mobile</option>
<option value="desktop">Desktop</option>
</select>

<select id="engine">
<option value="abstract">Abstract</option>
<option value="terrain">Landscape</option>
<option value="cosmic">Cosmic</option>
<option value="flow">Flow</option>
<option value="waves">Waves</option>
<option value="brush">Brush</option>
<option value="all">All Categories</option>
</select>

<select id="resolution">
<option value="hd">HD</option>
<option value="2k">2K</option>
<option value="4k">4K</option>
</select>

<button onclick="generatePreviewSet()">Generate</button>

</div>

<div class="preview-section">

<div class="main-preview">
<canvas id="mainCanvas"></canvas>
<button id="downloadMain">Download</button>
</div>

<div id="thumbRow" class="thumbnail-row"></div>

</div>

<div class="bulk-section">

<h3>Bulk Generator</h3>

<select id="bulkAmount">
<option>100</option>
<option>250</option>
<option>500</option>
<option>1000</option>
</select>

<button onclick="startBulk()">Start Bulk</button>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<div id="bulkPreview"></div>

<button id="downloadZipBtn" onclick="downloadZip()" disabled>Download ZIP</button>

</div>

<script src="app.js"></script>

</body>
</html>

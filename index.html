<!DOCTYPE html>
<html>
<head>
<title>Wallforce</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>

<body>

<h1>Wallforce</h1>
<p>Simple wallpaper generator</p>

<div class="controls">

<select id="device">
<option value="mobile">Mobile</option>
<option value="desktop">Desktop</option>
</select>

<select id="category">
<option value="abstract">Abstract</option>
<option value="cosmic">Cosmic</option>
<option value="waves">Waves</option>
<option value="flow">Flow</option>
<option value="terrain">Terrain</option>
<option value="brush">Brush</option>
<option value="random">Random</option>
</select>

<select id="resolution">
<option value="hd">HD</option>
<option value="2k">2K</option>
<option value="4k">4K</option>
</select>

<button id="generateBtn">Generate</button>

</div>

<div class="preview">
<canvas id="mainCanvas"></canvas>
<button id="downloadBtn">Download</button>
</div>

<div id="thumbRow"></div>

<hr>

<h2>Bulk Generator</h2>

<select id="bulkAmount">
<option>100</option>
<option>250</option>
<option>500</option>
<option>1000</option>
</select>

<button id="bulkBtn">Start Bulk</button>

<div id="progressBarContainer">
<div id="progressBar"></div>
</div>

<div id="bulkPreview"></div>

<button id="downloadZipBtn" disabled>Download ZIP</button>

<script src="app.js"></script>

</body>
</html>
